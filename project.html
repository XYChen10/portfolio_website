<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#F2EFE8" />
  <title>Project</title>
  <meta name="description" data-bind="description" content="Project detail." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23F2EFE8'/><text x='16' y='22' text-anchor='middle' font-family='monospace' font-size='16' font-weight='700' fill='%231A1815'>X</text></svg>" />
</head>
<body class="body--detail">
  <div class="cursor-dot" aria-hidden="true"></div>
  <div class="cursor-ring" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <!-- ============ NAV (minimal on detail page) ============ -->
  <header class="nav nav--detail" id="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo" aria-label="Home">
        <span class="nav__mark" data-bind="initials">·</span>
        <span class="nav__dot"></span>
      </a>
      <a href="index.html" class="nav__back mono" id="backLink">
        <span aria-hidden="true">←</span> Back to Projects
      </a>
    </div>
  </header>

  <main id="detailMain" aria-busy="true">
    <!-- Rendered by main.js -->
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <div class="footer__left mono">
        <span>© <span id="footerYear"></span> <span data-bind="name">—</span></span>
      </div>
      <div class="footer__right mono">
        <span data-bind="location">—</span>
        <a href="#" id="topLink" class="footer__top">▲ TOP</a>
      </div>
    </div>
  </footer>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" aria-hidden="true" role="dialog" aria-modal="true">
    <button class="lightbox__close" data-lightbox-close aria-label="Close">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 5l14 14M19 5L5 19"/></svg>
    </button>
    <button class="lightbox__prev" data-lightbox-prev aria-label="Previous image">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 4L7 12l8 8"/></svg>
    </button>
    <button class="lightbox__next" data-lightbox-next aria-label="Next image">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 4l8 8-8 8"/></svg>
    </button>
    <figure class="lightbox__figure">
      <img id="lightboxImg" alt="" />
      <figcaption class="lightbox__caption mono" id="lightboxCaption"></figcaption>
    </figure>
  </div>

  <script src="main.js"></script>
</body>
</html>
